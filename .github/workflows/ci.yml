name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout to a repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8 bandit safety
        
      - name: run flake8
        run: flake8
      
      - name: run bandit
        run: bandit

      - name: run safety
        run: safety check
      
      - name: run the tests
        run: pytest -q